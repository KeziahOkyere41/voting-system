<!DOCTYPE html>
<html>
<head>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    width: 100%;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  /* Ghana Flag Header */
  .ghana-header {
    height: 10px;
    display: flex;
    width: 100%;
  }

  .ghana-red {
    background: #c8102e;
    flex: 1;
  }

  .ghana-yellow {
    background: #ffd100;
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .ghana-green {
    background: #008751;
    flex: 1;
  }

  .black-star {
    color: black;
    font-size: 8px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .content {
    padding: 30px;
  }

  h2 {
    color: #2c3e50;
    text-align: center;
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  h2:before, h2:after {
    content: "⭐";
    font-size: 20px;
    color: #ffd100;
  }

  .card-input {
    width: 100%;
    padding: 15px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
    margin-bottom: 15px;
  }

  .card-input:focus {
    outline: none;
    border-color: #c8102e;
    box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
  }

  .button-container {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

  button {
    width: 100%;
    padding: 12px 30px; 
    background: linear-gradient(135deg, #c8102e 0%, #a00d25 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    /* margin-left: 20px; */
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(200,16,46,0.3);
  }

  button:active {
    transform: translateY(0);
  }

  #voteSection {
    background: #f8f9fa;
    border-radius: 15px;
    padding: 20px;
    margin: 20px 0;
    border: 2px solid #ffd100;
  }

  #voteSection h3 {
    color: #2c3e50;
    margin: 15px 0 10px;
    font-size: 18px;
  }

  #voteSection h3:first-child {
    margin-top: 0;
  }

  select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 15px;
    background: white;
    cursor: pointer;
  }

  select:focus {
    outline: none;
    border-color: #ffd100;
  }

  #results {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    color: white;
  }

  #results h3 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  #results h3:before {
    content: "📊";
  }

  #resultsDisplay {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 15px;
  }

  #resultsDisplay h4 {
    color: #ffd100;
    margin: 15px 0 10px;
    font-size: 18px;
    border-bottom: 2px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
  }

  #resultsDisplay h4:first-child {
    margin-top: 0;
  }

  #resultsDisplay p {
    display: flex;
    align-items: center;
    margin: 8px 0;
    padding: 8px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    font-size: 16px;
  }

  #resultsDisplay p strong {
    flex: 1;
    color: black;
  }

  #resultsDisplay p .vote-count {
    background: #ffd100;
    color: #2c3e50;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
  }

  #resultsDisplay small {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    font-size: 12px;
  }

  .alert {
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
    text-align: center;
    font-weight: 500;
  }

  .alert-success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .alert-error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    color: #666;
    font-size: 14px;
  }

  .footer-note span {
    color: #c8102e;
    font-weight: bold;
  }

  /* Animation for results update */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .results-updated {
    animation: pulse 0.5s ease;
  }

  /* #resultsDisplay p{
    background: black;
  } */

  #resultsDisplay {
    background: rgb(12 12 12 / 35%);
    border-radius: 10px;
    padding: 15px;
}

  /* Mobile responsive */
  @media (max-width: 600px) {
    .content {
      padding: 20px;
    }
    
    h2 {
      font-size: 24px;
    }
    
    button {
      padding: 12px;
    }
  }
  #results {
    margin-top: 30px;
    padding: 15px;
    border: 2px solid #333;
    border-radius: 10px;
    background-color: #f9f9f9;
    max-width: 400px;
    margin-left: 50px;
  }
  #results h3 {
    margin-top: 0;
    color: #2c3e50;
  }
  #resultsDisplay {
    min-height: 100px;
  }
  #resultsDisplay p {
    margin: 5px 0;
    padding: 5px;
    background: white;
    border-radius: 5px;
  }
  #resultsDisplay small {
    display: block;
    margin-top: 10px;
    color: #7f8c8d;
    font-style: italic;
  }
  .vote-count {
    font-weight: bold;
    color: #27ae60;
  }
</style>
  <title>Online Voting</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
  let currentVoter;

  async function verify() {
    const card = document.getElementById("card").value;
    console.log("Verifying card:", card);

    try {
      const res = await fetch("/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ghanaCard: card })
      });

      const data = await res.json();
      console.log("Verify response:", data);

      if (data.success) {
        currentVoter = data.voter;
        document.getElementById("voteSection").style.display = "block";
        alert(`Welcome ${data.voter.name}!`);
      } else {
        alert("Verification Failed: Invalid card or already voted");
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Server connection error");
    }
  }

  async function submitVote() {
    if (!currentVoter) {
      alert("Please verify first");
      return;
    }

    const voteData = {
      ghanaCard: currentVoter.ghanaCard,
      president: document.getElementById("president").value,
      mp: document.getElementById("mp").value,
      region: currentVoter.region
    };
    
    console.log("Submitting vote:", voteData);

    try {
      const res = await fetch("/vote", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(voteData)
      });

      const data = await res.json();
      console.log("Vote response:", data);

      if (data.success) {
        alert("Vote Submitted Successfully!");
        document.getElementById("voteSection").style.display = "none";
      } else {
        alert("Vote failed: " + (data.message || "Unknown error"));
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Server connection error");
    }
  }

// Socket connection for live results
const socket = io();

socket.on("connect", () => console.log("✅ Connected to real-time server"));

socket.on("liveResults", data => {
  console.log("🔥 Live Results Update:", data);
  
  const resultsDiv = document.getElementById('resultsDisplay');
  if (!resultsDiv) return;
  
  resultsDiv.innerHTML = '<h4>Presidential Results</h4>';
  
  // Presidential results
  const presResults = {};
  // MP results
  const mpResults = {};
  
  data.forEach(item => {
    if (item._id && item._id.president) {
      presResults[item._id.president] = item.total;
    }
    if (item._id && item._id.mp) {
      mpResults[item._id.mp] = item.total;
    }
  });
  
  // Display presidential results
  if (Object.keys(presResults).length === 0) {
    resultsDiv.innerHTML += '<p>No presidential votes yet</p>';
  } else {
    for (let [candidate, votes] of Object.entries(presResults)) {
      resultsDiv.innerHTML += `<p><strong>${candidate}</strong>: ${votes} votes</p>`;
    }
  }
  
  resultsDiv.innerHTML += '<h4>MP Results</h4>';
  
  // Display MP results
  if (Object.keys(mpResults).length === 0) {
    resultsDiv.innerHTML += '<p>No MP votes yet</p>';
  } else {
    for (let [candidate, votes] of Object.entries(mpResults)) {
      resultsDiv.innerHTML += `<p><strong>${candidate}</strong>: ${votes} votes</p>`;
    }
  }
  
  // Add timestamp
  resultsDiv.innerHTML += `<small>Last updated: ${new Date().toLocaleTimeString()}</small>`;
});

// Load initial results when page loads
window.onload = function() {
  fetch('/results')
    .then(r => r.json())
    .then(data => {
      console.log("Initial results:", data);
      const resultsDiv = document.getElementById('resultsDisplay');
      if (resultsDiv) {
        resultsDiv.innerHTML = '<h4>Presidential Results</h4>';
        
        if (data.length === 0) {
          resultsDiv.innerHTML += '<p>No votes yet</p>';
        } else {
          data.forEach(item => {
            resultsDiv.innerHTML += `<p><strong>${item._id.president}</strong>: ${item.total} votes</p>`;
          });
        }
      }
    })
    .catch(err => console.error("Error loading results:", err));
};
  let biometricVerified = false;
let currentCard = '';

// Simulate fingerprint scan
function simulateFingerprint() {
  const card = document.getElementById("card").value;
  
  if (!card) {
    alert("Please enter Ghana Card number first");
    return;
  }
  
  currentCard = card;
  
  // Show scanning animation
  const statusDiv = document.getElementById('fingerprintStatus');
  const bioMessage = document.getElementById('bioMessage');
  
  statusDiv.innerHTML = '🔍 Scanning fingerprint...';
  statusDiv.style.color = '#f39c12';
  
  // Simulate scanning delay
  setTimeout(async () => {
    // Check if this card has a fingerprint registered
    const res = await fetch('/check-biometric', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ghanaCard: card })
    });
    
    const data = await res.json();
    
    if (data.registered) {
      statusDiv.innerHTML = '✅ Fingerprint matched!';
      statusDiv.style.color = '#27ae60';
      bioMessage.innerHTML = `Welcome, ${data.name}!`;
      bioMessage.style.color = '#27ae60';
      biometricVerified = true;
      
      // Show verify button
      document.getElementById('verifyContainer').style.display = 'block';
    } else {
      statusDiv.innerHTML = '❌ Fingerprint not recognized';
      statusDiv.style.color = '#e74c3c';
      bioMessage.innerHTML = 'No biometric record found for this card';
      biometricVerified = false;
    }
  }, 2000); // 2 second delay to simulate scanning
}

// Modified verify function
async function verify() {
  if (!biometricVerified) {
    alert("Please scan fingerprint first");
    return;
  }

  const res = await fetch("/verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ghanaCard: currentCard })
  });

  const data = await res.json();

  if (data.success) {
    currentVoter = data.voter;
    document.getElementById("voteSection").style.display = "block";
    document.getElementById("verifyContainer").style.display = "none";
  } else {
    alert("Verification Failed: " + (data.message || "Invalid card"));
  }
}
  </script>
</head>
<body>
  <div class="container">
    <!-- Ghana Flag -->
    <div class="ghana-header">
      <div class="ghana-red"></div>
      <div class="ghana-yellow">
        <span class="black-star">⭐</span>
      </div>
      <div class="ghana-green"></div>
    </div>
  <h2>Ghana Card Verification</h2>
      <input type="text" id="card" class="card-input" placeholder="Enter Ghana Card Number">
      <button onclick="verify()">Verify Card</button>

<!-- Biometric simulation -->
<div style="margin: 20px 0; text-align: center;">
  <div id="fingerprintStatus" style="margin-bottom: 10px; color: #666;">
    ⏳ Place finger on scanner
  </div>
  <button onclick="simulateFingerprint()" style="width: auto; padding: 15px 30px;">
    👆 Scan Fingerprint
  </button>
  <p id="bioMessage" style="margin-top: 10px;"></p>
</div>

<!-- Hidden verify button - appears after fingerprint -->
<div id="verifyContainer" style="display: none; text-align: center;">
  <button onclick="verify()" style="width: auto; padding: 12px 30px; background: #27ae60;">
    ✅ Proceed to Vote
  </button>
</div>

  <div id="voteSection" style="display:none;">
    <h3>Vote for President</h3>
    <select id="president">
      <option value="Candidate A">Candidate A</option>
      <option value="Candidate B">Candidate B</option>
    </select>

    <h3>Vote for MP</h3>
    <select id="mp">
      <option value="MP 1">MP 1</option>
      <option value="MP 2">MP 2</option>
    </select>

    <button onclick="submitVote()">Submit Vote</button>
  </div>
  
  <div id="results">
    <h3>Live Results</h3>
    <div id="resultsDisplay">Loading results...</div>
  </div>
  <div class="footer-note">
    <span>🇬🇭</span> Your Vote, Your Voice<span>🇬🇭</span>
  </div>
</body>
</html>
