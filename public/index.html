<!DOCTYPE html>
<html>
<head>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background: #051d0b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: 150px;
    background-repeat: space;
    background-position: center;
    opacity: 0.1;
    pointer-events: none;
    z-index: -1;
    animation: floatBubbles 20s linear infinite;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 25%),
                radial-gradient(circle at 80% 30%, rgba(255,209,0,0.1) 0%, transparent 30%),
                radial-gradient(circle at 40% 80%, rgba(200,16,46,0.1) 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(0,135,81,0.1) 0%, transparent 40%);
    pointer-events: none;
    z-index: -1;
    animation: glassShift 15s ease-in-out infinite alternate;
  }

  .bubble {
    position: fixed;
    width: 200px;
    height: 200px;
    background-image: url('https://imgs.search.brave.com/eka3l7TurCTQTZJYiisskmx0WpMeOFXvGhXKu54bVIk/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90aHVt/YnMucGVvcGxlc2dk/YXJjaGl2ZS5vcmcv/c3RhdGljL21lZGlh/LWl0ZW1zL2ltYWdl/LzI5Njg1L3VwdG8t/MTQ0MHg2NjcvNjVl/MTRmYzQvMS9pbWFn/ZS5wbmc');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.03;
    pointer-events: none;
    z-index: -1;
    animation: floatBubble 15s ease-in-out infinite;
  }

  .bubble:nth-child(1) {
    top: 10%;
    left: 5%;
    width: 250px;
    height: 250px;
    animation-duration: 18s;
    animation-delay: -2s;
  }

  .bubble:nth-child(2) {
    top: 70%;
    left: 85%;
    width: 300px;
    height: 300px;
    animation-duration: 22s;
    animation-delay: -5s;
  }

  .bubble:nth-child(3) {
    top: 40%;
    left: 45%;
    width: 180px;
    height: 180px;
    animation-duration: 14s;
    animation-delay: -8s;
  }

  .bubble:nth-child(4) {
    top: 80%;
    left: 15%;
    width: 220px;
    height: 220px;
    animation-duration: 20s;
    animation-delay: -12s;
  }

  .bubble:nth-child(5) {
    top: 20%;
    left: 75%;
    width: 280px;
    height: 280px;
    animation-duration: 25s;
    animation-delay: -3s;
  }

  .bubble:nth-child(6) {
    top: 60%;
    left: 25%;
    width: 160px;
    height: 160px;
    animation-duration: 16s;
    animation-delay: -7s;
  }

  @keyframes floatBubbles {
    0% { background-position: 0 0, 50px 50px, 100px 100px; }
    100% { background-position: 500px 500px, 550px 550px, 600px 600px; }
  }

  @keyframes floatBubble {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(5deg); }
    66% { transform: translate(-20px, 20px) rotate(-5deg); }
  }

  @keyframes glassShift {
    0% { opacity: 0.3; background-position: 0% 0%; }
    50% { opacity: 0.5; }
    100% { opacity: 0.3; background-position: 100% 100%; }
  }

  .container {
    max-width: 500px;
    width: 100%;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.3);
    position: relative;
    z-index: 1;
  }

  img {
    height: 50px;
    width: auto;
    display: block;
    margin: 0 auto;
  }

  h2 {
    color: #2c3e50;
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin: 5px 0 15px 0;
  }

  .card-input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 14px;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
  }

  .card-input:focus {
    outline: none;
    border-color: #c8102e;
    box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
  }

  button {
    padding: 10px 20px;
    background: linear-gradient(135deg, #c8102e 0%, #a00d25 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(200,16,46,0.3);
  }

  button:active {
    transform: translateY(0);
  }

  #fingerprintStatus {
    background: rgba(248, 249, 250, 0.9) !important;
    backdrop-filter: blur(5px);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    text-align: center;
  }

  #voteSection {
    background: rgba(248, 249, 250, 0.95);
    backdrop-filter: blur(5px);
    border-radius: 12px;
    padding: 15px;
    margin: 10px 0;
    border: 2px solid #ffd100;
  }

  select {
    width: 100%;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    background: white;
    cursor: pointer;
  }

  #results {
    margin-top: 15px;
    padding: 12px;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    border-radius: 12px;
  }

  #results h3 {
    margin: 0 0 8px 0;
    font-size: 16px;
    color: white;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Compact Scrollable Results Display */
  #resultsDisplay {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px;
    color: white;
    font-size: 12px;
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #ffd100 rgba(255,255,255,0.1);
  }

  #resultsDisplay::-webkit-scrollbar {
    width: 4px;
  }

  #resultsDisplay::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
  }

  #resultsDisplay::-webkit-scrollbar-thumb {
    background: #ffd100;
    border-radius: 10px;
  }

  /* Presidential and MP results styling */
  .pres-section, .mp-section {
    margin-bottom: 8px;
  }

  .section-title {
    color: #ffd100;
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 2px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
    font-size: 11px;
  }

  .candidate-name {
    color: white;
    max-width: 70%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .candidate-votes {
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 10px;
  }

  .timestamp {
    display: block;
    text-align: center;
    margin-top: 5px;
    color: rgba(255,255,255,0.7);
    font-size: 9px;
    font-style: italic;
  }

  .footer-note {
    text-align: center;
    margin-top: 10px;
    color: white;
    font-size: 12px;
  }

  .footer-note span {
    color: #ffd100;
    font-weight: bold;
  }

  @media (max-width: 600px) {
    .container {
      max-width: 95%;
    }
    
    button {
      font-size: 12px;
      padding: 8px 15px;
    }
    
    #resultsDisplay {
      max-height: 100px;
    }
  }
  </style>
  <title>Online Voting System - Ghana</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
  let currentVoter;
  let biometricVerified = false;
  let currentCard = '';

  async function verify() {
    console.log("🔍 Verify function called");
    console.log("Current card:", currentCard);
    console.log("Biometric verified:", biometricVerified);

    if (!biometricVerified) {
      alert("Please scan fingerprint first");
      return;
    }

    if (!currentCard) {
      alert("Card number is missing");
      return;
    }

    console.log("Sending to server:", { ghanaCard: currentCard });

    try {
      const res = await fetch("/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ghanaCard: currentCard })
      });

      const data = await res.json();
      console.log("Verify response:", data);

      if (data.success) {
        currentVoter = data.voter;
        document.getElementById("voteSection").style.display = "block";
        document.getElementById("verifyContainer").style.display = "none";
        alert(`Welcome ${data.voter.name}!`);
      } else {
        alert("Verification Failed: " + (data.message || "Invalid card"));
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Server connection error");
    }
  }

  async function submitVote() {
    if (!currentVoter) {
      alert("Please verify first");
      return;
    }

    const voteData = {
      ghanaCard: currentVoter.ghanaCard,
      president: document.getElementById("president").value,
      mp: document.getElementById("mp").value,
      region: currentVoter.region
    };
    
    console.log("Submitting vote:", voteData);

    try {
      const res = await fetch("/vote", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(voteData)
      });

      const data = await res.json();
      console.log("Vote response:", data);

      if (data.success) {
        alert("Vote Submitted Successfully!");
        setTimeout(() => {
           window.location.reload();
        }, 1000);
        document.getElementById("voteSection").style.display = "none";
      } else {
        alert("Vote failed: " + (data.message || "Unknown error"));
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Server connection error");
    }
  }

  // Socket connection for live results
  const socket = io();

  socket.on("connect", () => console.log("✅ Connected to real-time server"));

  // Format candidate name for display
  function formatName(name, type) {
    if (!name) return '';
    if (type === 'president') {
      if (name.includes('Bawumia')) return 'Bawumia';
      if (name.includes('Mahama')) return 'Mahama';
      if (name.includes('Alan')) return 'Alan';
      if (name.includes('Bediako')) return 'Nana Kwame';
    }
    if (type === 'mp') {
      if (name.includes('Ursula')) return 'Ursula';
      if (name.includes('Ablakwa')) return 'Ablakwa';
      if (name.includes('Kennedy')) return 'Kennedy';
      if (name.includes('Haruna')) return 'Haruna';
    }
    return name.split(' ')[0];
  }

  // Update results display
  function updateResultsDisplay(data) {
    const resultsDiv = document.getElementById('resultsDisplay');
    if (!resultsDiv) return;
    
    let html = '<div class="pres-section">';
    html += '<div class="section-title">🗳️ PRESIDENTIAL</div>';
    
    const presResults = Array.isArray(data) ? data.filter(item => item?._id?.president) : [];
    
    if (presResults.length === 0) {
      html += '<div class="result-row">No votes yet</div>';
    } else {
      presResults.forEach(item => {
        const shortName = formatName(item._id.president, 'president');
        html += `
          <div class="result-row">
            <span class="candidate-name">${shortName}</span>
            <span class="candidate-votes">${item.total}</span>
          </div>
        `;
      });
    }
    
    html += '</div><div class="mp-section">';
    html += '<div class="section-title">👥 MP</div>';
    
    const mpResults = Array.isArray(data) ? data.filter(item => item?._id?.mp) : [];
    
    if (mpResults.length === 0) {
      html += '<div class="result-row">No votes yet</div>';
    } else {
      mpResults.forEach(item => {
        const shortName = formatName(item._id.mp, 'mp');
        html += `
          <div class="result-row">
            <span class="candidate-name">${shortName}</span>
            <span class="candidate-votes">${item.total}</span>
          </div>
        `;
      });
    }
    
    html += '</div>';
    
    resultsDiv.innerHTML = html;
    document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
  }

  socket.on("liveResults", data => {
    console.log("🔥 Live Results Update:", data);
    updateResultsDisplay(data);
  });

  // Load initial results
  window.onload = function() {
    fetch('/results')
      .then(r => r.json())
      .then(data => {
        console.log("Initial results:", data);
        updateResultsDisplay(data);
      })
      .catch(err => {
        console.error("Error loading results:", err);
        document.getElementById('resultsDisplay').innerHTML = '<div class="result-row">Error loading results</div>';
      });
  };

  // Simulate fingerprint scan
  function simulateFingerprint() {
    const card = document.getElementById("card").value.trim();
    
    if (!card) {
      alert("Please enter Ghana Card number first");
      return;
    }
    
    currentCard = card;
    
    const statusDiv = document.getElementById('fingerprintStatus');
    const bioMessage = document.getElementById('bioMessage');
    
    statusDiv.innerHTML = '🔍 Scanning fingerprint...';
    statusDiv.style.color = '#f39c12';
    bioMessage.innerHTML = '';
    
    setTimeout(async () => {
      try {
        const res = await fetch('/check-biometric', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ghanaCard: card })
        });
        
        const data = await res.json();
        console.log("Biometric response:", data);
        
        if (data.registered) {
          statusDiv.innerHTML = '✅ Fingerprint matched!';
          statusDiv.style.color = '#27ae60';
          bioMessage.innerHTML = `Welcome, ${data.name}!`;
          bioMessage.style.color = '#27ae60';
          biometricVerified = true;
          
          document.getElementById('verifyContainer').style.display = 'block';
        } else {
          statusDiv.innerHTML = '❌ Fingerprint not recognized';
          statusDiv.style.color = '#e74c3c';
          bioMessage.innerHTML = 'No biometric record found for this card';
          biometricVerified = false;
          document.getElementById('verifyContainer').style.display = 'none';
        }
      } catch (error) {
        console.error("Error:", error);
        statusDiv.innerHTML = '❌ Error checking fingerprint';
        statusDiv.style.color = '#e74c3c';
      }
    }, 2000);
  }
  </script>
</head>
<body>

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="container">
    <!-- Coat of Arms -->
    <div style="display: flex; justify-content: center; padding-top: 20px;">
      <img src="https://imgs.search.brave.com/X1F4dbBZzHE42-eW-rrq4RZCFJbB015mORp-W-BkPG4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMTEy/NDc1NTA2Ni92ZWN0/b3IvY29hdC1vZi1h/cm1zLW9mLWdoYW5h/LmpwZz9zPTYxMng2/MTImdz0wJms9MjAm/Yz03aGVPNDlJLWxq/YmtOckZYU0dJbDNM/SERxMVhuZGthOVFo/SDNiREpZQlZNPQ" alt="Ghana Coat of Arms">
    </div>
    
    <div style="padding: 10px 20px 20px 20px;">
      <!-- Card Input + Scan Button -->
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <input type="text" id="card" class="card-input" placeholder="Enter Ghana Card Number" style="margin-bottom: 0;">
        <button onclick="simulateFingerprint()" style="width: auto; padding: 0 15px; margin-bottom: 0; background: #34495e; white-space: nowrap;">
          👆 Scan
        </button>
      </div>

      <!-- Fingerprint Status -->
      <div id="fingerprintStatus" style="margin-bottom: 8px;">
        ⏳ Place finger on scanner
      </div>
      
      <p id="bioMessage" style="margin: 5px 0; min-height: 20px; font-size: 13px; text-align: center;"></p>

      <!-- Hidden verify button -->
      <div id="verifyContainer" style="display: none; text-align: center; margin: 8px 0;">
        <button onclick="verify()" style="width: auto; padding: 8px 20px; background: #27ae60; border: none; border-radius: 50px; font-size: 13px;">
          ✅ Proceed to Vote
        </button>
      </div>

      <!-- Vote Section -->
      <div id="voteSection" style="display:none;">
        <h3 style="margin: 0 0 10px 0; font-size: 15px;">🗳️ Cast Your Vote</h3>
        
        <select id="president" style="margin-bottom: 8px;">
          <option value="Dr. Mahamudu Bawumia">Bawumia (NPP)</option>
          <option value="John Dramani Mahama">Mahama (NDC)</option>
          <option value="Alan Kyerematen">Alan (Ind.)</option>
          <option value="Nana Kwame Bediako">Nana Kwame (Ind.)</option>
        </select>

        <select id="mp" style="margin-bottom: 10px;">
          <option value="Ursula Owusu-Ekuful (NPP - Ablekuma West)">Ursula (NPP)</option>
          <option value="Samuel Okudzeto Ablakwa (NDC - North Tongu)">Ablakwa (NDC)</option>
          <option value="Kennedy Agyapong (NPP - Assin Central)">Kennedy (NPP)</option>
          <option value="Haruna Iddrisu (NDC - Tamale South)">Haruna (NDC)</option>
        </select>

        <button onclick="submitVote()" style="width: 100%; padding: 10px;">Submit Vote</button>
      </div>
      
      <!-- Results - Compact & Scrollable -->
      <div id="results">
        <h3>📊 Live Results</h3>
        <div id="resultsDisplay"></div>
        <small class="timestamp">Last updated: <span id="timestamp">-</span></small>
      </div>
    </div>
  </div>

  <div class="footer-note">
    <span>🇬🇭</span> Your Vote, Your Voice <span>🇬🇭</span>
  </div>

</body>
