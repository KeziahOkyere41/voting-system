<!DOCTYPE html>
<html>
<head>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  img{
    height: 5%;
    width: 30%;
    margin-left: 3%;
  }

  body {
    background: #051d0b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    width: 100%;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .content {
    padding: 30px;
  }

  h2 {
    color: #2c3e50;
    text-align: center;
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .card-input {
    width: 100%;
    padding: 15px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
    margin-bottom: 15px;
  }

  .card-input:focus {
    outline: none;
    border-color: #c8102e;
    box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
  }

  .button-container {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

  button {
    width: 100%;
    padding: 12px 30px; 
    background: linear-gradient(135deg, #c8102e 0%, #a00d25 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(200,16,46,0.3);
  }

  button:active {
    transform: translateY(0);
  }

  #voteSection {
    background: #f8f9fa;
    border-radius: 15px;
    padding: 20px;
    margin: 20px 0;
    border: 2px solid #ffd100;
  }

  #voteSection h3 {
    color: #2c3e50;
    margin: 15px 0 10px;
    font-size: 18px;
  }

  #voteSection h3:first-child {
    margin-top: 0;
  }

  select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 15px;
    background: white;
    cursor: pointer;
  }

  select:focus {
    outline: none;
    border-color: #ffd100;
  }

  #results {
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    color: white;
    max-width: 250px;
    margin-left: 20px;
  }

  #results h3 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  #results h3:before {
    content: "📊";
  }

  #resultsDisplay {
    background: #e1b800 !important;
    border-radius: 10px;
    padding: 15px;
  }

  #resultsDisplay h4 {
    color: black;
    margin: 15px 0 10px;
    font-size: 18px;
    border-bottom: 2px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
  }

  #resultsDisplay h4:first-child {
    margin-top: 0;
  }

  #resultsDisplay p {
    display: flex;
    align-items: center;
    margin: 8px 0;
    padding: 8px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    font-size: 16px;
    color: black;
  }

  #resultsDisplay p strong {
    flex: 1;
    color: rgb(3, 3, 3);
  }

  #resultsDisplay p .vote-count {
    background: white;
    color: black;
    padding: 4px 12px;
    font-weight: bold;
    font-size: 14px;
  }

  #resultsDisplay small {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: black !important;
    font-style: italic;
    font-size: 12px;
  }

  .alert {
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
    text-align: center;
    font-weight: 500;
  }

  .alert-success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .alert-error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    color: #666;
    font-size: 14px;
  }

  .footer-note span {
    color: #c8102e;
    font-weight: bold;
  }

  /* Animation for results update */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .results-updated {
    animation: pulse 0.5s ease;
  }

  #resultsDisplay {
    background: rgb(12 12 12 / 35%);
    border-radius: 10px;
    padding: 15px;
}

  /* Mobile responsive */
  @media (max-width: 600px) {
    .content {
      padding: 20px;
    }
    
    h2 {
      font-size: 24px;
    }
    
    button {
      padding: 12px;
    }
  }
  #results {
    margin-top: 30px;
    padding: 15px;
    border: 2px solid #333;
    border-radius: 10px;
    background-color: #f9f9f9;
    max-width: 400px;
    margin-left: 50px;
  }
  #results h3 {
    margin-top: 0;
    color: #2c3e50;
  }
  #resultsDisplay {
    min-height: 100px;
  }
  #resultsDisplay p {
    margin: 5px 0;
    padding: 5px;
    background: white;
    border-radius: 5px;
  }
  #resultsDisplay small {
    display: block;
    margin-top: 10px;
    color: #7f8c8d;
    font-style: italic;
  }
  .vote-count {
    font-weight: bold;
    color: #27ae60;
    background: white;
  }

</style>
  <title>Online Voting</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
  let currentVoter;
  let biometricVerified = false;
  let currentCard = '';

  async function verify() {
    console.log("🔍 Verify function called");
    console.log("Current card:", currentCard);
    console.log("Biometric verified:", biometricVerified);

    if (!biometricVerified) {
      alert("Please scan fingerprint first");
      return;
    }

    if (!currentCard) {
      alert("Card number is missing");
      return;
    }

    console.log("Sending to server:", { ghanaCard: currentCard });

    try {
      const res = await fetch("/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ghanaCard: currentCard })
      });

      const data = await res.json();
      console.log("Verify response:", data);

      if (data.success) {
        currentVoter = data.voter;
        document.getElementById("voteSection").style.display = "block";
        document.getElementById("verifyContainer").style.display = "none";
        alert(`Welcome ${data.voter.name}!`);
      } else {
        alert("Verification Failed: " + (data.message || "Invalid card"));
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Server connection error");
    }
  }

  async function submitVote() {
    if (!currentVoter) {
      alert("Please verify first");
      return;
    }

    const voteData = {
      ghanaCard: currentVoter.ghanaCard,
      president: document.getElementById("president").value,
      mp: document.getElementById("mp").value,
      region: currentVoter.region
    };
    
    console.log("Submitting vote:", voteData);

    try {
      const res = await fetch("/vote", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(voteData)
      });

      const data = await res.json();
      console.log("Vote response:", data);

      if (data.success) {
        alert("Vote Submitted Successfully!");
        setTimeout(() => {
           window.location.reload();
        }, 1000);
        document.getElementById("voteSection").style.display = "none";
      } else {
        alert("Vote failed: " + (data.message || "Unknown error"));
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Server connection error");
    }
  }

  // Socket connection for live results
  const socket = io();

  socket.on("connect", () => console.log("✅ Connected to real-time server"));

  // FIXED: Live results with null checks
  socket.on("liveResults", data => {
    console.log("🔥 Live Results Update:", data);
    
    const resultsDiv = document.getElementById('resultsDisplay');
    if (!resultsDiv) return;
    
    let html = '<h4>📊 Presidential Results</h4>';
    
    // Safely filter presidential results
    const presResults = Array.isArray(data) ? data.filter(item => item?._id?.president) : [];
    
    if (presResults.length === 0) {
      html += '<p>No presidential votes yet</p>';
    } else {
      presResults.forEach(item => {
        html += `<p><strong>${item._id.president}</strong>: <span class="vote-count">${item.total}</span> votes</p>`;
      });
    }
    
    html += '<h4 style="margin-top:20px;">🗳️ MP Results</h4>';
    
    // Safely filter MP results
    const mpResults = Array.isArray(data) ? data.filter(item => item?._id?.mp) : [];
    
    if (mpResults.length === 0) {
      html += '<p>No MP votes yet</p>';
    } else {
      mpResults.forEach(item => {
        html += `<p><strong>${item._id.mp}</strong>: <span class="vote-count">${item.total}</span> votes</p>`;
      });
    }
    
    // Add timestamp
    html += `<small>Last updated: ${new Date().toLocaleTimeString()}</small>`;
    
    resultsDiv.innerHTML = html;
  });

  // FIXED: Load initial results with null checks
  window.onload = function() {
    fetch('/results')
      .then(r => r.json())
      .then(data => {
        console.log("Initial results:", data);
        const resultsDiv = document.getElementById('resultsDisplay');
        if (!resultsDiv) return;
        
        let html = '<h4>📊 Presidential Results</h4>';
        
        // Safely filter presidential results
        const presResults = Array.isArray(data) ? data.filter(item => item?._id?.president) : [];
        
        if (presResults.length === 0) {
          html += '<p>No presidential votes yet</p>';
        } else {
          presResults.forEach(item => {
            html += `<p><strong>${item._id.president}</strong>: <span class="vote-count">${item.total}</span> votes</p>`;
          });
        }
        
        html += '<h4 style="margin-top:20px;">🗳️ MP Results</h4>';
        
        // Safely filter MP results
        const mpResults = Array.isArray(data) ? data.filter(item => item?._id?.mp) : [];
        
        if (mpResults.length === 0) {
          html += '<p>No MP votes yet</p>';
        } else {
          mpResults.forEach(item => {
            html += `<p><strong>${item._id.mp}</strong>: <span class="vote-count">${item.total}</span> votes</p>`;
          });
        }
        
        resultsDiv.innerHTML = html;
      })
      .catch(err => {
        console.error("Error loading results:", err);
        document.getElementById('resultsDisplay').innerHTML = '<p>Error loading results</p>';
      });
  };

  // Simulate fingerprint scan
  function simulateFingerprint() {
    const card = document.getElementById("card").value.trim();
    
    if (!card) {
      alert("Please enter Ghana Card number first");
      return;
    }
    
    currentCard = card;
    
    // Show scanning animation
    const statusDiv = document.getElementById('fingerprintStatus');
    const bioMessage = document.getElementById('bioMessage');
    
    statusDiv.innerHTML = '🔍 Scanning fingerprint...';
    statusDiv.style.color = '#f39c12';
    bioMessage.innerHTML = '';
    
    // Simulate scanning delay
    setTimeout(async () => {
      try {
        // Check if this card has a fingerprint registered
        const res = await fetch('/check-biometric', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ghanaCard: card })
        });
        
        const data = await res.json();
        console.log("Biometric response:", data);
        
        if (data.registered) {
          statusDiv.innerHTML = '✅ Fingerprint matched!';
          statusDiv.style.color = '#27ae60';
          bioMessage.innerHTML = `Welcome, ${data.name}!`;
          bioMessage.style.color = '#27ae60';
          biometricVerified = true;
          
          // Show verify button
          document.getElementById('verifyContainer').style.display = 'block';
        } else {
          statusDiv.innerHTML = '❌ Fingerprint not recognized';
          statusDiv.style.color = '#e74c3c';
          bioMessage.innerHTML = 'No biometric record found for this card';
          biometricVerified = false;
          document.getElementById('verifyContainer').style.display = 'none';
        }
      } catch (error) {
        console.error("Error:", error);
        statusDiv.innerHTML = '❌ Error checking fingerprint';
        statusDiv.style.color = '#e74c3c';
      }
    }, 2000); // 2 second delay to simulate scanning
  }
  </script>
</head>
<body>

  <div class="container">
        <div style="display: flex; justify-content: center; padding-top: 30px;">
      <img src="https://www.citypng.com/public/uploads/preview/hd-ghana-coat-of-arms-logo-png-7017516947754299amhvbcau9.png">
      </div>
    <br>
  <h2>VERIFY YOUR GHANA CARD</h2>
      <input type="text" id="card" class="card-input" placeholder="Enter Ghana Card Number">

  <div style="margin: 20px 0; text-align: center;">
  <div id="fingerprintStatus" style="margin-bottom: 10px; padding: 15px; background: #f8f9fa; border-radius: 10px; color: #666;">
    ⏳ Place finger on scanner
  </div>
  <button onclick="simulateFingerprint()" style="width: auto; padding: 15px 30px; background: #34495e;">
    👆 Biometric Verification
  </button>
  <p id="bioMessage" style="margin-top: 10px; min-height: 20px;"></p>
</div>

<!-- Hidden verify button - appears after fingerprint -->
<div id="verifyContainer" style="display: none; text-align: center; margin: 15px 0;">
  <button onclick="verify()" style="width: auto; padding: 12px 30px; background: #27ae60; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer;">
    ✅ Proceed to Vote
  </button>
</div>

  <div id="voteSection" style="display:none;">
    <h3>Vote for President</h3>
    <select id="president">
      <option value="John Mahama">John Mahama (NDC)</option>
      <option value="Nana Akufo-Addo">Nana Akufo-Addo (NPP)</option>
    </select>

    <h3>Vote for MP</h3>
    <select id="mp">
      <option value="Rashid Bawa">Rashid Bawa (NDC)</option>
      <option value="Farouk Mahama">Farouk Mahama (NPP)</option>
    </select>

    <button onclick="submitVote()">Submit Vote</button>
  </div>
  
  <div id="results">
    <h3>Live Results</h3>
    <div id="resultsDisplay">Loading results...</div>
  </div>
  <div class="footer-note">
    <span>🇬🇭</span> Your Vote, Your Voice <span>🇬🇭</span>
  </div>
</body>
</html>
